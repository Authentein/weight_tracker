<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#080808">
<title>Deehan — Daily Weigh-In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--card:#0f0f0f;--line:#1c1c1c;--txt:#e8e8e8;--dim:#666;--dimmer:#444;--red:#8B1A1A;--redL:#c97070;--green:#16a34a;--greenL:#4ade80;--amber:#d4a020;--blue:#7090c9;--navy:#1F3864;--mono:'Courier New',monospace}
body{background:var(--bg);color:var(--txt);font-family:'Georgia',serif;min-height:100vh;padding-bottom:20px}
.hero{padding:1.4rem 1rem 1rem;border-bottom:1px solid var(--line)}
.hero .name{font-size:10px;color:var(--dimmer);letter-spacing:.18em;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px}
.hero h1{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hero h1 span{color:var(--red)}
.hero .sub{font-size:12px;color:var(--dim);font-family:var(--mono);margin-top:4px}
.wrap{max-width:600px;margin:0 auto;padding:1rem}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;flex:1;min-width:80px}
.stat .label{font-size:9px;color:var(--dimmer);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.stat .val{font-size:16px;font-weight:700;color:#fff;margin-top:2px;font-family:var(--mono)}
.stat .val.green{color:var(--greenL)}
.stat .val.amber{color:var(--amber)}
.stat .val.blue{color:var(--blue)}
.miles{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.mile{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:4px 8px;text-align:center;min-width:60px}
.mile.hit{background:#0a1f14;border-color:var(--green)}
.mile .mo{font-size:8px;color:var(--dimmer);font-family:var(--mono)}
.mile .tgt{font-size:11px;font-weight:700;color:var(--dim);font-family:var(--mono)}
.mile.hit .tgt{color:var(--greenL)}
.monthtabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:1rem;overflow-x:auto}
.monthtab{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:none;color:var(--dim);font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:700}
.monthtab.on{color:#fff;border-bottom-color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;text-align:left;color:#fff;font-weight:700;background:var(--navy);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
th.ctr{text-align:center}
td{padding:6px 8px;border-bottom:1px solid #111}
tr.even{background:var(--card)}
tr.thu td.day{color:var(--amber)}
tr.wkavg{background:#1a0d0d;border-bottom:2px solid var(--line)}
tr.wkavg td{color:var(--redL);font-weight:700;font-size:11px}
tr.moavg{background:#0d1320;border-top:2px solid var(--navy)}
tr.moavg td{color:var(--blue);font-weight:700;font-size:12px}
input[type=number],input[type=text]{background:#1a1a1a;border:1px solid var(--line);border-radius:5px;color:#fff;font-family:var(--mono);font-size:13px;padding:5px 6px;text-align:center}
input[type=number]{width:68px}
input[type=text]{width:100%;max-width:160px;text-align:left;font-size:10px}
input:focus{outline:none;border-color:var(--red);background:#222}
.change{font-family:var(--mono);font-weight:700;text-align:center}
.change.neg{color:var(--greenL)}
.change.pos{color:var(--redL)}
.change.zero{color:var(--dim)}
.info{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 16px;font-size:11px;color:var(--dim);line-height:1.6;margin-top:1rem}
.info b{color:var(--blue)}
.foot{text-align:center;font-size:9px;color:var(--dimmer);margin-top:1rem;font-family:var(--mono)}
</style>
</head>
<body>
<div class="hero">
  <div class="name">Christopher Caleb Deehan</div>
  <h1>Weigh-In<span>.</span></h1>
  <div class="sub">Daily Log · Jun–Dec 2026 · Target −80 lbs</div>
</div>
<div class="wrap" id="app"></div>

<script>
const BASELINE=353,TARGET=273,GOAL_LOSS=80;
const MILESTONES=[
  {mo:"Baseline",tgt:353},{mo:"Mo 1",tgt:333},{mo:"Mo 2",tgt:321},{mo:"Mo 3",tgt:313},
  {mo:"Mo 4",tgt:305},{mo:"Mo 5",tgt:298},{mo:"Mo 6",tgt:291},{mo:"Mo 7",tgt:284},
  {mo:"Mo 8–10",tgt:273}
];
const MONTH_NAMES=["June","July","August","September","October","November","December"];
const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const STORE_KEY="deehan_weighin_v2";

// Initial data from Week 1
const SEED_W={"2026-06-01":353,"2026-06-02":351,"2026-06-03":352,"2026-06-04":350,"2026-06-05":351,"2026-06-06":350,"2026-06-07":351};
const SEED_N={"2026-06-01":"Starting weight","2026-06-04":"Fast day","2026-06-07":"Week 1 avg 351.1"};

let data;
function load(){
  try{const s=localStorage.getItem(STORE_KEY);data=s?JSON.parse(s):{w:{...SEED_W},n:{...SEED_N},month:0};}
  catch(e){data={w:{...SEED_W},n:{...SEED_N},month:0};}
}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(data));}catch(e){}}

function genDays(monthIdx){
  const m=monthIdx+5; // 5=June
  const year=2026;
  const start=new Date(year,m,1),end=new Date(year,m+1,0);
  // Clamp to Jun 1 – Dec 31
  const first=monthIdx===0?1:1;
  const last=end.getDate();
  const days=[];
  for(let d=first;d<=last;d++){
    const dt=new Date(year,m,d);
    if(dt<new Date(2026,5,1)||dt>new Date(2026,11,31))continue;
    const key=`${year}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=dt.getDay();
    days.push({key,d,day:DAY_NAMES[dow],isSun:dow===0,isThu:dow===4});
  }
  return days;
}

// All keys in order for change calc
const ALL_KEYS=[];
for(let mi=0;mi<7;mi++)genDays(mi).forEach(d=>ALL_KEYS.push(d.key));

function getChange(key){
  const idx=ALL_KEYS.indexOf(key);
  if(idx<=0)return null;
  const cur=data.w[key];
  if(cur===undefined||cur===null||cur==="")return null;
  for(let i=idx-1;i>=0;i--){
    const v=data.w[ALL_KEYS[i]];
    if(v!==undefined&&v!==null&&v!=="")return cur-v;
  }
  return null;
}

function weekAvg(days,endIdx){
  const si=Math.max(0,endIdx-6);
  const slice=days.slice(si,endIdx+1);
  const vals=slice.map(d=>data.w[d.key]).filter(v=>v!==undefined&&v!==null&&v!=="").map(Number);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

function monthAvg(days){
  const vals=days.map(d=>data.w[d.key]).filter(v=>v!==undefined&&v!==null&&v!=="").map(Number);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

function latestWeight(){
  for(let i=ALL_KEYS.length-1;i>=0;i--){
    const v=data.w[ALL_KEYS[i]];
    if(v!==undefined&&v!==null&&v!=="")return Number(v);
  }
  return BASELINE;
}

function render(){
  const app=document.getElementById("app");
  const latest=latestWeight();
  const lost=BASELINE-latest;
  const entries=ALL_KEYS.filter(k=>data.w[k]!==undefined&&data.w[k]!==null&&data.w[k]!=="").length;

  let h="";

  // Stats
  h+=`<div class="stats">`;
  h+=`<div class="stat"><div class="label">Current</div><div class="val">${latest}</div></div>`;
  h+=`<div class="stat"><div class="label">Lost</div><div class="val green">${lost>0?"−"+lost.toFixed(1):"0"}</div></div>`;
  h+=`<div class="stat"><div class="label">Entries</div><div class="val blue">${entries}</div></div>`;
  h+=`<div class="stat"><div class="label">Target</div><div class="val amber">${TARGET} (−${GOAL_LOSS})</div></div>`;
  h+=`</div>`;

  // Milestones
  h+=`<div class="miles">`;
  MILESTONES.forEach(m=>{
    const hit=latest<=m.tgt;
    h+=`<div class="mile ${hit?"hit":""}"><div class="mo">${m.mo}</div><div class="tgt">${m.tgt}</div></div>`;
  });
  h+=`</div>`;

  // Month tabs
  h+=`<div class="monthtabs">`;
  MONTH_NAMES.forEach((mn,i)=>{
    h+=`<div class="monthtab ${data.month===i?"on":""}" onclick="setMonth(${i})">${mn.substring(0,3)}</div>`;
  });
  h+=`</div>`;

  // Table
  const days=genDays(data.month);
  h+=`<table><thead><tr><th>Date</th><th>Day</th><th class="ctr">Weight</th><th class="ctr">Change</th><th>Notes</th></tr></thead><tbody>`;

  let prevSunAvg=null;
  days.forEach((d,i)=>{
    const w=data.w[d.key];
    const ch=d.key==="2026-06-01"?"baseline":getChange(d.key);
    const chClass=ch==="baseline"?"zero":ch===null?"zero":ch<0?"neg":ch>0?"pos":"zero";
    const chStr=ch==="baseline"?"baseline":ch===null?"—":(ch>0?"+":"")+ch.toFixed(1);
    const cls=[]
    if(i%2===0)cls.push("even");
    if(d.isThu)cls.push("thu");

    h+=`<tr class="${cls.join(" ")}">`;
    h+=`<td style="font-weight:700;color:var(--blue)">${MONTH_NAMES[data.month].substring(0,3)} ${d.d}</td>`;
    h+=`<td class="day">${d.day}${d.isThu?" ⚡":""}</td>`;
    h+=`<td style="text-align:center"><input type="number" step="0.1" value="${w!==undefined&&w!==null&&w!==""?w:""}" placeholder="—" onchange="setW('${d.key}',this.value)"></td>`;
    h+=`<td class="change ${chClass}">${chStr}</td>`;
    h+=`<td><input type="text" value="${(data.n[d.key]||"").replace(/"/g,"&quot;")}" placeholder="${d.isThu?"Fast day":""}" onchange="setN('${d.key}',this.value)"></td>`;
    h+=`</tr>`;

    // Weekly avg after Sunday
    if(d.isSun){
      const avg=weekAvg(days,i);
      const wkCh=avg&&prevSunAvg?avg-prevSunAvg:null;
      const wkChStr=wkCh!==null?(wkCh>0?"+":"")+wkCh.toFixed(1)+" /wk":"—";
      h+=`<tr class="wkavg"><td colspan="2">WEEKLY AVG</td><td style="text-align:center">${avg?avg.toFixed(1):"—"}</td>`;
      h+=`<td style="text-align:center;font-size:10px;color:${wkCh&&wkCh<0?"var(--greenL)":"var(--dim)"}">${wkChStr}</td>`;
      h+=`<td><input type="text" value="${(data.n[d.key+"_wk"]||"").replace(/"/g,"&quot;")}" placeholder="Weekly notes..." onchange="setN('${d.key}_wk',this.value)" style="border-color:#2a1515"></td></tr>`;
      prevSunAvg=avg;
    }
  });

  // Monthly avg
  const mAvg=monthAvg(days);
  const mLoss=mAvg?BASELINE-mAvg:null;
  h+=`<tr class="moavg"><td colspan="2">MONTHLY AVG</td><td style="text-align:center">${mAvg?mAvg.toFixed(1):"—"}</td>`;
  h+=`<td style="text-align:center;font-size:10px">${mLoss&&mLoss>0?"−"+mLoss.toFixed(1)+" total":"—"}</td>`;
  h+=`<td><input type="text" value="${(data.n[MONTH_NAMES[data.month]+"_mo"]||"").replace(/"/g,"&quot;")}" placeholder="Monthly notes..." onchange="setN('${MONTH_NAMES[data.month]}_mo',this.value)" style="border-color:var(--navy)"></td></tr>`;
  h+=`</tbody></table>`;

  // Info
  h+=`<div class="info"><b>HOW TO USE:</b> Weigh in every morning — after bathroom, before eating, same clothing. Daily weight fluctuates 2–5 lbs. Individual days are noise. The <span style="color:var(--redL)">weekly average</span> and <span style="color:var(--blue)">monthly average</span> are the real signal. ~2 lbs/week as a guide, not a whip. ⚡ = fast day.<br><br><b>DATA</b> saves in your browser. Same device + same browser = data stays.</div>`;
  h+=`<div class="foot">Baseline: ${BASELINE} lbs (Jun 1, 2026) · Target: ${TARGET} lbs (−${GOAL_LOSS}) by Mar 2027</div>`;

  app.innerHTML=h;
}

function setW(key,val){
  if(val===""||val===undefined){delete data.w[key];}
  else{const n=parseFloat(val);if(!isNaN(n))data.w[key]=n;}
  save();render();
}
function setN(key,val){data.n[key]=val;save();}
function setMonth(i){data.month=i;save();render();}

// Auto-detect current month on load
function autoMonth(){
  const now=new Date();
  if(now.getFullYear()===2026&&now.getMonth()>=5&&now.getMonth()<=11){
    data.month=now.getMonth()-5;
  }
}

load();autoMonth();save();render();
</script>
</body>
</html>
